// ── Map init ──────────────────────────────────────────────────────────────────
const map = L.map('map', {center:[37.3,-118.7],zoom:9,zoomControl:true});

const topo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',{
  maxZoom:17,attribution:'&copy; OpenTopoMap'});
const sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{
  maxZoom:19,attribution:'Tiles &copy; Esri'});
topo.addTo(map);

// ── Layers ────────────────────────────────────────────────────────────────────
const passGroup = L.layerGroup().addTo(map);
const thGroup   = L.layerGroup().addTo(map);
const routeGroup= L.layerGroup().addTo(map);

// Pass icon
function passIcon(d){
  const col = d==="Easy"||d==="Easy–Mod" ? "#4ade80"
            : d==="Moderate"             ? "#60a5fa"
            : d==="Mod–Hard"             ? "#f59e0b"
            : d==="Hard"                 ? "#f97316"
            :                              "#ef4444";
  return L.divIcon({
    className:'',
    iconSize:[22,22],iconAnchor:[11,11],
    html:'<div style="width:20px;height:20px;border-radius:50%;background:'+col+';border:2px solid #fff;box-shadow:0 1px 4px #0008;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#000">&#9650;</div>'
  });
}
function thIcon(){
  return L.divIcon({
    className:'',iconSize:[18,18],iconAnchor:[9,9],
    html:'<div style="width:16px;height:16px;border-radius:3px;background:#ff4444;border:2px solid #fff;box-shadow:0 1px 4px #0008"></div>'
  });
}

// Render passes
PASSES.forEach(p=>{
  const m=L.marker([p.lat,p.lng],{icon:passIcon(p.d)});
  m.bindPopup(()=>{
    return '<div class="popup-name">'+p.n+'</div>'+
      '<div class="popup-meta">'+
        '&#9650; '+p.el+' &nbsp;&#8226;&nbsp; '+p.d+' &nbsp;&#8226;&nbsp; Week '+p.wk+'<br>'+
        'TH: '+p.th+
      '</div>'+
      '<div class="popup-links"><a href="'+p.at+'" target="_blank" rel="noopener">AllTrails</a>'+
      '<a href="https://caltopo.com/map.html#ll='+p.lat+','+p.lng+'&z=14&b=mbt" target="_blank" rel="noopener">CalTopo</a></div>';
  },{maxWidth:260});
  passGroup.addLayer(m);
});

// Render trailheads
TRAILHEADS.forEach(t=>{
  const m=L.marker([t.lat,t.lng],{icon:thIcon()});
  m.bindPopup('<div class="popup-name">'+t.n+'</div>',{maxWidth:200});
  thGroup.addLayer(m);
});

// Render routes
const routeColors=['#60a5fa','#4ade80','#f59e0b','#f97316','#a78bfa',
                   '#34d399','#fb7185','#38bdf8','#facc15','#c084fc',
                   '#6ee7b7','#fda4af','#7dd3fc','#d9f99d','#fcd34d',
                   '#f0abfc','#86efac','#bfdbfe'];
ROUTES.forEach((r,i)=>{
  const line=L.polyline(r.c.map(c=>[c[1],c[0]]),{
    color:routeColors[i%routeColors.length],weight:2.5,opacity:0.7
  });
  line.bindTooltip(r.n,{sticky:true,className:'leaflet-tooltip'});
  routeGroup.addLayer(line);
});

// ── Layer toggles ─────────────────────────────────────────────────────────────
const layerMap={passes:passGroup,trailheads:thGroup,routes:routeGroup};
document.querySelectorAll('.lbtn[data-layer]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const key=btn.dataset.layer;
    const grp=layerMap[key];
    if(map.hasLayer(grp)){ map.removeLayer(grp); btn.classList.remove('on'); }
    else { map.addLayer(grp); btn.classList.add('on'); }
  });
});

// Tile toggles
document.getElementById('tileBtn').addEventListener('click',()=>{
  map.addLayer(topo); map.removeLayer(sat);
  document.getElementById('tileBtn').classList.add('on');
  document.getElementById('satBtn').classList.remove('on');
});
document.getElementById('satBtn').addEventListener('click',()=>{
  map.addLayer(sat); map.removeLayer(topo);
  document.getElementById('satBtn').classList.add('on');
  document.getElementById('tileBtn').classList.remove('on');
});
</script>
</body>
</html>
